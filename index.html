<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/alumni_logo.png" />
    <script>
      (function() {
        var img = new Image();
        img.src = '/alumni_logo.png';
        img.onload = function() {
          var canvas = document.createElement('canvas');
          var size = Math.min(img.width, img.height) || 128;
          canvas.width = size;
          canvas.height = size;
          var ctx = canvas.getContext('2d');
          ctx.beginPath();
          ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, 0, 0, size, size);
          var link = document.querySelector("link[rel*='icon']") || document.createElement('link');
          link.type = 'image/png';
          link.rel = 'shortcut icon';
          link.href = canvas.toDataURL('image/png');
          document.getElementsByTagName('head')[0].appendChild(link);
        };
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>প্রাক্তন শিক্ষার্থী পরিষদ — Dhuapalong Govt. Primary School</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-gray-50 text-dark font-english">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
